<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 통합관리 대시보드</title>
    <!-- 파비콘 설정 -->
    <link rel="icon" type="image/png" href="https://github.com/volt240820/insight-care-bot/blob/main/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/volt240820/insight-care-bot/6fbd29a5b8a2419f6a4750df443edcb110fe717a/favicon.svg" />
    <link rel="shortcut icon" href="https://github.com/volt240820/insight-care-bot/blob/main/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://github.com/volt240820/insight-care-bot/blob/main/apple-touch-icon.png?raw=true" />
    
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        .iframe-container {
            width: 100%; height: 100%;
            overflow: hidden;
            position: relative;
        }
        /* ★★★ 핵심: 모바일에서 화면을 축소해서 보여주는 스타일 ★★★ */
        .responsive-iframe {
            position: absolute;
            border: none;
            top: -45px; /* 구글 상단 바 가리기 */
            left: 0;
            width: 1400px; /* 대시보드 기준 너비 */
            height: calc(100% / (window.innerWidth / 1400) + 45px); /* 높이 비율 계산 */
            transform-origin: 0 0;
        }

        /* 모바일 기기일 때만 축소 적용 */
        @media (max-width: 1399px) {
            .responsive-iframe {
                /* 화면 너비에 맞춰 비율 계산 (아이폰/갤럭시 등 대응) */
                transform: scale(calc(window.innerWidth / 1400));
                width: 1400px;
                height: 500%; /* 충분히 길게 설정 */
            }
        }
    </style>
    <script>
        // 화면 크기가 바뀔 때마다 배율을 다시 계산합니다.
        function setScale() {
            var width = window.innerWidth;
            var iframe = document.querySelector('.responsive-iframe');
            if (width < 1400) {
                var scale = width / 1400;
                iframe.style.transform = 'scale(' + scale + ')';
                iframe.style.width = '1400px';
                // 높이도 배율에 맞춰서 보정 (스크롤을 위해)
                iframe.style.height = (100 / scale) + '%'; 
            } else {
                iframe.style.transform = 'none';
                iframe.style.width = '100%';
                iframe.style.height = '100%';
            }
        }
        window.addEventListener('resize', setScale);
        window.addEventListener('load', setScale);
    </script>
</head>
<body>
    <div class="iframe-container">
        <iframe class="responsive-iframe" src="https://script.google.com/macros/s/AKfycbzt8SJAtZ67RxZlQ6qSSGRhpv8LpR4zWI6nNJXIiF_9vMNsaJBAALzb_OQFRcb_j9rKDA/exec"></iframe>
    </div>
</body>
</html>
