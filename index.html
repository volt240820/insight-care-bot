<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 통합관리 대시보드</title>
    <link rel="icon" type="image/png" href="https://github.com/volt240820/insight-care-bot/blob/main/favicon-96x96.png" />
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/volt240820/insight-care-bot/6fbd29a5b8a2419f6a4750df443edcb110fe717a/favicon.svg" />
    <link rel="shortcut icon" href="https://github.com/volt240820/insight-care-bot/blob/main/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://github.com/volt240820/insight-care-bot/blob/main/apple-touch-icon.png?raw=true" />
    <meta name="apple-mobile-web-app-title" content="MyWebSite" />
    <link rel="manifest" href="https://github.com/volt240820/insight-care-bot/blob/main/web-app-manifest-512x512.png?raw=true" />
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        .iframe-container {
            width: 100%; height: 100%;
            overflow: hidden;
            position: relative;
            -webkit-overflow-scrolling: touch; /* iOS 스크롤 부드럽게 */
        }
        .responsive-iframe {
            position: absolute;
            border: none;
            width: 100%;
            height: calc(100% + 40px); 
            top: -40px; 
            left: 0;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe class="responsive-iframe" src="https://script.google.com/macros/s/AKfycbzt8SJAtZ67RxZlQ6qSSGRhpv8LpR4zWI6nNJXIiF_9vMNsaJBAALzb_OQFRcb_j9rKDA/exec" scrolling="yes"></iframe>
    </div>
</body>
</html>
